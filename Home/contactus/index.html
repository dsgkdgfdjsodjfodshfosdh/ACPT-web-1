<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="main_container">
      <div class="bg">
        <img src="./assets/leaf.png" class="logo" alt="" />
      </div>

      <div class="contactus_form">
        <p class="header">Contact Us</p>

        <div class="fdiv">
          <label class="fname"><b>Full Name</b></label>
          <input type="text" class="fname_input" placeholder="full name" />
        </div>

        <div class="ediv">
          <label class="email"><b>E-mail</b></label>
          <input type="text" class="email_input" placeholder="e-mail" />
        </div>

        <div class="mdiv">
          <label class="messege"><b>Message</b></label>
          <input
            type="textfield"
            class="message_input"
            placeholder="Type Message"
          />
        </div>

        <button class="btn">
          <p class="btntxt"><b>Contact Us</b></p>
        </button>
      </div>

      <div class="contactus2">
        <h4 class="contact"><b>Contact</b></h4>
        <p class="p1">hi@green.com</p>

        <h4 class="basedIn"><b>Based in</b></h4>
        <p class="p2">Los Angeles,</p>
        <p class="p3">California</p>

        <div class="social_icons">
          <img src="./assets/fb.png" class="fb" alt="" />
          <img src="./assets/insta.png" class="insta" alt="" />
          <img src="./assets/Twitter - Negative.png" class="twitter" alt="" />
        </div>
      </div>
    </div>
  </body>
</html>
